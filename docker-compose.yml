services:

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: fit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
    - "5432:5432"  
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
    expose:
      - "8000"
    volumes:
      - static_files:/app/staticfiles
    networks:
      - app-network

  # vk_bot:
  #   build:
  #     context: ./backend
  #   restart: unless-stopped
  #   env_file:
  #     - ./backend/.env
  #   depends_on:
  #     - db
  #   environment:
  #     DB_HOST: db
  #     DB_PORT: 5432
  #   command: python manage.py run_vk_bot
  #   networks:
  #     - app-network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    expose:
      - "3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network


volumes:
  postgres_data:
  static_files:

networks:
  app-network:
    driver: bridge